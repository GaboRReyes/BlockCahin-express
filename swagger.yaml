openapi: 3.0.3
info:
  title: Red Blockchain Distribuida — Grados Académicos
  description: |
    API REST para un nodo de una red blockchain distribuida que gestiona
    títulos y grados académicos mediante Proof of Work y consenso por cadena más larga.
  version: 1.0.0

servers:
  - url: http://localhost:8001
    description: Nodo 1 (local)
  - url: http://localhost:8002
    description: Nodo 2 (local)

tags:
  - name: Sistema
  - name: Cadena
  - name: Transacciones
  - name: Minado
  - name: Nodos

paths:

  /health:
    get:
      tags: [Sistema]
      operationId: getHealth
      summary: Estado del nodo
      responses:
        '200':
          description: Nodo operativo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                nodeId: nodo-1
                port: "8001"
                bloques: 5
                pendientes: 2
                peers:
                  - http://localhost:8002

  /chain:
    get:
      tags: [Cadena]
      operationId: getChain
      summary: Obtener cadena completa
      responses:
        '200':
          description: Cadena completa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChainResponse'
              example:
                chain:
                  - index: 0
                    timestamp: 1774481949941
                    hashActual: "abc"
                    hashAnterior: "0"
                    nonce: 0
                    data:
                      mensaje: "Bloque Génesis"
                length: 1

  /transactions:
    post:
      tags: [Transacciones]
      operationId: createTransaction
      summary: Registrar transacción
      parameters:
        - $ref: '#/components/parameters/XPropagated'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransaccionInput'
      responses:
        '201':
          description: Transacción creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransaccionResponse'
        '400':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /mine:
    post:
      tags: [Minado]
      operationId: mineBlock
      summary: Minar bloque
      responses:
        '200':
          description: Bloque minado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MineResponse'
        '400':
          description: Sin transacciones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /nodes:
    get:
      tags: [Nodos]
      operationId: getNodes
      summary: Listar nodos
      responses:
        '200':
          description: Lista de nodos
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodos:
                    type: array
                    items:
                      type: string
                      format: uri

  /nodes/register:
    post:
      tags: [Nodos]
      operationId: registerNodes
      summary: Registrar nodos
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nodos]
              properties:
                nodos:
                  type: array
                  items:
                    type: string
                    format: uri
      responses:
        '200':
          description: Nodos registrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodesRegisterResponse'

  /nodes/resolve:
    get:
      tags: [Nodos]
      operationId: resolveChain
      summary: Resolver conflictos
      responses:
        '200':
          description: Resultado del consenso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveResponse'

  /nodes/block:
    post:
      tags: [Nodos]
      operationId: receiveBlock
      summary: Recibir bloque
      parameters:
        - $ref: '#/components/parameters/XPropagated'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bloque]
              properties:
                bloque:
                  $ref: '#/components/schemas/Bloque'
            example:
              bloque:
                index: 5
                timestamp: 1774730558235
                hashActual: "0000abc"
                hashAnterior: "0000def"
                nonce: 1234
                data:
                  minadoPor: "nodo-1"
                  transacciones: []
      responses:
        '200':
          description: Bloque aceptado
        '400':
          description: Bloque inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflicto de cadena
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  parameters:
    XPropagated:
      in: header
      name: X-Propagated
      schema:
        type: string
        enum: ["true"]

  schemas:

    Bloque:
      type: object
      required:
        - index
        - timestamp
        - data
        - hashAnterior
        - nonce
        - hashActual
      properties:
        index:
          type: integer
        timestamp:
          type: integer
        hashActual:
          type: string
        hashAnterior:
          type: string
        nonce:
          type: integer
        data:
          oneOf:
            - type: object
              properties:
                mensaje:
                  type: string
            - type: object
              properties:
                minadoPor:
                  type: string
                transacciones:
                  type: array
                  items:
                    $ref: '#/components/schemas/Transaccion'

    Transaccion:
      type: object
      required:
        - id
        - personaId
        - institucionId
        - programaId
        - tituloObtenido
        - fechaFin
        - firmadoPor
      properties:
        id:
          type: string
          format: uuid
        personaId:
          type: string
          format: uuid
        institucionId:
          type: string
          format: uuid
        programaId:
          type: string
          format: uuid
        tituloObtenido:
          type: string
        fechaFin:
          type: string
          format: date
        numeroCedula:
          type: string
          nullable: true
        tituloTesis:
          type: string
          nullable: true
        menciones:
          type: string
          nullable: true
        firmadoPor:
          type: string
        creadoEn:
          type: string
          format: date-time

    TransaccionInput:
      type: object
      required:
        - personaId
        - institucionId
        - programaId
        - tituloObtenido
        - fechaFin
        - firmadoPor
      properties:
        personaId:
          type: string
        institucionId:
          type: string
        programaId:
          type: string
        tituloObtenido:
          type: string
        fechaFin:
          type: string
        numeroCedula:
          type: string
          nullable: true
        tituloTesis:
          type: string
          nullable: true
        menciones:
          type: string
          nullable: true
        firmadoPor:
          type: string

    TransaccionResponse:
      type: object
      properties:
        mensaje:
          type: string
        transaccion:
          $ref: '#/components/schemas/Transaccion'
        propagada:
          type: boolean
        indiceBloque:
          type: integer

    ChainResponse:
      type: object
      required: [chain, length]
      properties:
        chain:
          type: array
          items:
            $ref: '#/components/schemas/Bloque'
        length:
          type: integer

    MineResponse:
      type: object
      properties:
        mensaje:
          type: string
        bloque:
          $ref: '#/components/schemas/Bloque'
        nodosMine:
          type: string
        propagadoA:
          type: array
          items:
            type: string

    NodesRegisterResponse:
      type: object
      properties:
        mensaje:
          type: string
        nodosActivos:
          type: array
          items:
            type: string

    ResolveResponse:
      type: object
      properties:
        mensaje:
          type: string
        reemplazada:
          type: boolean
        longitud:
          type: integer

    HealthResponse:
      type: object
      properties:
        status:
          type: string
        nodeId:
          type: string
        port:
          type: string
        bloques:
          type: integer
        pendientes:
          type: integer
        peers:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string